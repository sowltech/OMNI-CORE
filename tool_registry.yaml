version: 1
owner: sowltech
registry_name: omni-core-tool-registry
risk_classes:
  R0: read-only inspection
  R1: reversible local write
  R2: environment or workflow mutation
  R3: secret, network, or external side effects
  R4: destructive or irreversible action

tools:
  - name: inspect_repo
    purpose: inspect repository structure and contents
    risk_class: R0
    scopes: [read]
    approval_required: false
    logging_required: true
    rollback_possible: false
    inputs: [path, query]
    outputs: [file_list, snippets, summaries]

  - name: edit_local_file
    purpose: make a reversible edit to a local file
    risk_class: R1
    scopes: [write]
    approval_required: true
    logging_required: true
    rollback_possible: true
    inputs: [target_file, patch]
    outputs: [diff, status]

  - name: run_workflow
    purpose: execute a declared local workflow
    risk_class: R2
    scopes: [workflow, system]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [workflow_name, command]
    outputs: [status, logs]

  - name: access_secret
    purpose: retrieve or use a secret in an approved flow
    risk_class: R3
    scopes: [secrets]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [secret_name, purpose]
    outputs: [status]

  - name: destructive_delete
    purpose: remove a file, artifact, or resource
    risk_class: R4
    scopes: [delete, write]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [target]
    outputs: [status]

  - name: submit_claim
    purpose: create a new governed knowledge claim with source and confidence level
    risk_class: R1
    scopes: [write]
    approval_required: true
    logging_required: true
    rollback_possible: true
    inputs: [content, source_type, source_ref, confidence, entered_by, domain, knowledge_system]
    outputs: [claim_id, audit_event_id, status]

  - name: read_claim
    purpose: retrieve a claim record by ID or query
    risk_class: R0
    scopes: [read]
    approval_required: false
    logging_required: true
    rollback_possible: false
    inputs: [claim_id, query]
    outputs: [claim_record, status]

  - name: update_claim_confidence
    purpose: update the confidence level of an existing claim with documented reason
    risk_class: R1
    scopes: [write]
    approval_required: true
    logging_required: true
    rollback_possible: true
    inputs: [claim_id, new_confidence, reason, actor]
    outputs: [claim_id, audit_event_id, status]

  - name: submit_contestation
    purpose: file a formal contestation against an existing claim
    risk_class: R1
    scopes: [write]
    approval_required: true
    logging_required: true
    rollback_possible: true
    inputs: [target_claim_id, contested_by, grounds, counter_evidence, counter_confidence]
    outputs: [contestation_id, audit_event_id, status]

  - name: resolve_contestation
    purpose: close a contestation with a documented arbitration outcome
    risk_class: R2
    scopes: [write, workflow]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [contestation_id, resolution_summary, resolved_by, upheld_claim_id, confidence]
    outputs: [resolution_id, audit_event_id, status]

  - name: submit_knowledge_entry
    purpose: create a structured sovereign knowledge record with full provenance
    risk_class: R1
    scopes: [write]
    approval_required: true
    logging_required: true
    rollback_possible: true
    inputs: [title, summary, content, knowledge_system, source_type, source_ref, confidence, entered_by, domain]
    outputs: [entry_id, audit_event_id, status]

  - name: freeze_artifact
    purpose: mark a schema, workflow, or artifact as frozen — no mutation without thaw
    risk_class: R2
    scopes: [write, workflow]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [target, target_type, frozen_by, reason]
    outputs: [freeze_id, audit_event_id, status]

  - name: thaw_artifact
    purpose: lift a freeze on a previously frozen artifact with documented justification
    risk_class: R2
    scopes: [write, workflow]
    approval_required: true
    logging_required: true
    rollback_possible: false
    inputs: [freeze_id, thawed_by, thaw_reason]
    outputs: [freeze_id, audit_event_id, status]
